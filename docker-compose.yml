services:
  # Bundled Grocy instance — only starts when you use --profile with-grocy
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    profiles: [with-grocy]
    volumes:
      - grocy_data:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-UTC}
    ports:
      - "9283:80"
    restart: unless-stopped

  # HomeClaw agent
  homeclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      # Falls back to bundled grocy when --profile with-grocy is active
      GROCY_URL: ${GROCY_URL:-http://grocy:9283}
      TELEGRAM_ENABLED: "true"
    restart: unless-stopped

  # Cloudflare Tunnel sidecar — only starts when you use --profile tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles: [tunnel]
    restart: unless-stopped

volumes:
  grocy_data:
